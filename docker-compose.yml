services:

  # ── ZAP daemon ─────────────────────────────────────────────────────────────
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    command: >
      zap.sh -daemon
        -host 0.0.0.0
        -port 8090
        -config api.key=changeme
        -config api.addrs.addr.name=.*
        -config api.addrs.addr.regex=true
    ports:
      - "8090:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8090/JSON/core/view/version/?apikey=changeme"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── API (FastAPI) ───────────────────────────────────────────────────────────
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      ZAP_API_BASE: "http://zap:8090"
      DATABASE_URL: "sqlite:////app/data/vapt.db"
    volumes:
      - db_data:/app/data
      - ./reports:/app/reports
    depends_on:
      zap:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── UI (Streamlit) ──────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_BASE: "http://api:8000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
